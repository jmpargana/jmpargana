<footer class="site-footer">
  <div class="site-footer__inner">
    <div class="site-footer__brand">
      <div class="site-footer__copy">© {{ now.Year }} MIT Licensed.</div>
      <div class="site-footer__tagline">Joao Pargana Blog & Site</div>
    </div>
    <div class="site-footer__social">
      <a class="site-footer__social-link" href="https://github.com/jmpargana/" target="_blank" rel="noopener noreferrer" aria-label="GitHub">
        {{ partial "icon.html" (dict "name" "git") }}
        <span class="site-footer__social-label">GitHub</span>
      </a>
      <a class="site-footer__social-link" href="https://www.linkedin.com/in/jo%C3%A3o-pargana-9757b91b2/" target="_blank" rel="noopener noreferrer" aria-label="LinkedIn">
        {{ partial "icon.html" (dict "name" "linked") }}
        <span class="site-footer__social-label">LinkedIn</span>
      </a>
      <a class="site-footer__social-link" href="mailto:jmpargana@gmail.com" aria-label="Email">
        {{ partial "icon.html" (dict "name" "mail") }}
        <span class="site-footer__social-label">Email</span>
      </a>
    </div>
  </div>
</footer>
